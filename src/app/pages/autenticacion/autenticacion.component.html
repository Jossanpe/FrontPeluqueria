  <div class="d-flex flex-column min-vh-100">
    <app-header></app-header>
    <main class="login-container flex-grow-1 d-flex justify-content-center">
      <div class="d-flex justify-content-center">
        
        
        <div class="login-box">
          <!-- mx-auto: margenes horizontales automáticos; d-block: convierte la imagen esn display:block  -->
          
          <form [formGroup]="formularioAutenticacion" (ngSubmit)="submit()">
            <img src="logo.png" alt="logo" width="80px" class="logo mx-auto d-none d-md-block mb-3" />
            <h2 class="text-center mb-3 titulo-greatvibes">AUTENTICACION</h2>
            
            <!-- CAMPO EMAIL -->
            <div class="mb-3">
              <input
              formControlName="tel"
            type="tel"
            class="form-control"
            placeholder="Telefono"
            [class.is-invalid]="tel?.touched && tel?.invalid" 
            /><!-- pladeholder: activar o desactivar una clase css según el estado del control del formulario. El ? indica que acceda a la propiedad solo si el objeto existe. 
            Es decir, el input o contenido solo sera invalido y dara error si el usuario ya toco el campo, y se ha comprobado que la validacion de contenido no es correcta -->
            
            <div class="invalid-feedback" *ngIf="tel?.touched && tel?.invalid">
              Introduce un telefono válido
            </div>
          </div>
          
          
          <!-- CAMPO PASSWORD -->
          <div class="mb-3">
            <input
            formControlName="claveSeguridad"
            type="password"
            class="form-control"
            placeholder="Clave Seguridad"
            [class.is-invalid]="claveSeguridad?.touched && claveSeguridad?.invalid"
            />
            <!--  LOS CORCHETES [ ] indican property binding(enlace de propiedad), significa que angular evaluara la expresion de la derecha.
            En este caso indica que active o desactive la is-invalid segun la condicion-->
            <div class="invalid-feedback" *ngIf="claveSeguridad?.touched && claveSeguridad?.invalid">
              La contraseña es obligatoria
            </div>
            <a href="/autenticacion">Recordar clave de acceso</a>
          </div>
          
          
          
          <!-- BOTÓN -->
          <div class="d-flex justify-content-center gap-3 mt-4">
            
            <app-boton  type="submit" [disabled]="carga">
              <span *ngIf="!carga">ENTRAR</span>
              <span *ngIf="carga">Enviando...</span>
            </app-boton>
            
            <app-boton  routerLink="/registro">
              REGISTRARME
            </app-boton>
          </div>
          <!-- ERROR -->
          <div *ngIf="error" class="alert alert-danger mt-3 py-2 text-center">
            {{ error }}
          </div>
          
        </form>
      </div>
    </div>
  </main>
  <app-footer></app-footer>
</div>
